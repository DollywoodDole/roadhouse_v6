name: RoadHouse Motors — Daily Social Post

on:
  schedule:
    - cron: '0 15 * * *'   # 9:00am CST (Saskatchewan, UTC-6 year-round)
  workflow_dispatch:         # manual trigger from GitHub Actions tab

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to commit posted.json back

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r roadhouse-motors-social-manager/requirements.txt

      - name: Post to Facebook + Instagram
        working-directory: roadhouse-motors-social-manager
        env:
          CRON_SECRET:           ${{ secrets.CRON_SECRET }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          FB_PAGE_ID:            ${{ vars.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN:  ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          IG_USER_ID:            ${{ vars.IG_USER_ID }}
        run: python social_manager.py --live

      - name: Persist posted.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add roadhouse-motors-social-manager/posted.json
          git diff --staged --quiet || git commit -m "chore(motors-social): update posted.json [skip ci]"
          git push
