# RoadHouse Capital — CI
# Type-checks and builds on every push and PR to main.
# Deployment is handled by Vercel's native GitHub integration — no deploy step here.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Type Check & Build
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_APP_URL: https://roadhouse.capital
      NEXT_PUBLIC_SOLANA_NETWORK: devnet
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_stub
      STRIPE_SECRET_KEY: sk_test_stub
      STRIPE_WEBHOOK_SECRET: whsec_stub

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
